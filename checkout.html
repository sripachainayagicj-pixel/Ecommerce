<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>ShopHub</h1>
      </div>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li>
          <a href="cart.html">
            Cart <span id="cartCount" class="cart-badge">0</span>
          </a>
        </li>
        <li id="navUser">
          <a href="login.html">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Page Title -->
  <section class="page-title">
    <h2>Checkout</h2>
  </section>

  <!-- Checkout Section -->
  <section class="checkout-section">
    <div class="container">
      <div class="checkout-container">
        <!-- Order Details -->
        <div class="checkout-form">
          <h3>Shipping Address</h3>
          <form id="checkoutForm">
            <div class="form-group">
              <label>Street Address</label>
              <input type="text" id="street" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" id="city" required>
              </div>
              <div class="form-group">
                <label>State</label>
                <input type="text" id="state" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Zip Code</label>
                <input type="text" id="zipCode" required>
              </div>
              <div class="form-group">
                <label>Country</label>
                <input type="text" id="country" required>
              </div>
            </div>

            <h3 style="margin-top: 30px;">Payment Method</h3>
            <div class="form-group">
              <select id="paymentMethod" required>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px;">
              Place Order
            </button>
          </form>
        </div>

        <!-- Order Summary -->
        <div class="checkout-summary">
          <h3>Order Summary</h3>
          <div id="checkoutItems">
            <!-- Cart items shown here -->
          </div>
          <hr>
          <div class="summary-item">
            <span>Subtotal:</span>
            <span id="checkoutSubtotal">$0.00</span>
          </div>
          <div class="summary-item">
            <span>Shipping:</span>
            <span id="checkoutShipping">$0.00</span>
          </div>
          <div class="summary-item">
            <span>Tax:</span>
            <span id="checkoutTax">$0.00</span>
          </div>
          <div class="summary-item total">
            <span>Total:</span>
            <span id="checkoutTotal">$0.00</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Success Modal -->
  <div id="successModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>✓ Order Placed Successfully</h2>
      <p id="orderMessage">Your order has been placed!</p>
      <p id="orderId"></p>
      <button onclick="window.location.href='index.html'" class="btn btn-primary">
        Back to Home
      </button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 ShopHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
