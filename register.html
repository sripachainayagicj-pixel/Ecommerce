<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>ShopHub</h1>
      </div>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li>
          <a href="cart.html">
            Cart <span id="cartCount" class="cart-badge">0</span>
          </a>
        </li>
        <li id="navUser">
          <a href="register.html" class="active">Register</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Auth Section -->
  <section class="auth-section">
    <div class="container">
      <div class="auth-container">
        <div class="auth-form">
          <h2>Create Account</h2>
          <p>Join us and start shopping today</p>

          <form id="registerForm">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="registerName" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="registerEmail" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="registerPassword" required placeholder="Enter password (min 6 characters)">
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" id="registerConfirmPassword" required placeholder="Confirm password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
          </form>

          <p class="auth-toggle">
            Already have an account? 
            <a href="login.html">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 ShopHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
