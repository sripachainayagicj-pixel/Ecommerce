<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>ShopHub</h1>
      </div>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li>
          <a href="cart.html" class="active">
            Cart <span id="cartCount" class="cart-badge">0</span>
          </a>
        </li>
        <li id="navUser">
          <a href="login.html">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Page Title -->
  <section class="page-title">
    <h2>Shopping Cart</h2>
  </section>

  <!-- Cart Section -->
  <section class="cart-section">
    <div class="container">
      <div class="cart-container">
        <!-- Cart Items -->
        <div class="cart-items">
          <h3>Cart Items</h3>
          <div id="cartItems">
            <!-- Cart items loaded here -->
          </div>
          <div id="emptyCart" class="empty-cart" style="display: none;">
            <p>Your cart is empty</p>
            <a href="products.html" class="btn btn-primary">Continue Shopping</a>
          </div>
        </div>

        <!-- Cart Summary -->
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-item">
            <span>Subtotal:</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-item">
            <span>Shipping:</span>
            <span id="shipping">$0.00</span>
          </div>
          <div class="summary-item">
            <span>Tax:</span>
            <span id="tax">$0.00</span>
          </div>
          <div class="summary-item total">
            <span>Total:</span>
            <span id="total">$0.00</span>
          </div>
          <button id="checkoutBtn" class="btn btn-primary btn-block">
            Proceed to Checkout
          </button>
          <a href="products.html" class="btn btn-secondary btn-block">
            Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 ShopHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
